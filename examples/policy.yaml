# Example policy draft for the current Heim grant model.
#
# Heim does not load policy files yet.

grants:
  aws.prod-readonly:
    provider: aws.prod
    requesters:
      - binary: codex
      - binary: claude-code
    commands:
      - "aws *"
      - "claude-code *"
    approval:
      mode: jit
      transport: slack

  github.drymn-pr-write:
    provider: github.drymn
    requesters:
      - binary: codex
      - binary: gh
    commands:
      - "gh pr *"
      - "claude-code *"
    approval:
      mode: jit
      transport: slack

  github.personal-readonly:
    provider: github.personal
    requesters:
      - binary: gh
    commands:
      - "gh repo view *"
      - "gh pr view *"
    approval:
      mode: grant

approval_transports:
  slack:
    type: slack
    channel: "#heim-approvals"
